<div th:fragment="content">
    <h1 th:text="#{export.view.bookings}">Bookings</h1>
    
    <div class="header-info">
        <p><strong>Gesellschafter:</strong> <span th:text="${data.shareholderName}">Name</span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th th:each="header : ${data.headers}" th:text="${header}">Header</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data.rows}" 
                th:with="isOpening=${row instanceof T(de.nihas101.midas.bookings.row.OpeningBalanceBookingRow)},
                         isMonthly=${row instanceof T(de.nihas101.midas.bookings.row.MonthlySummaryBookingRow)},
                         isCumulative=${row instanceof T(de.nihas101.midas.bookings.row.CumulativeSummaryBookingRow)}"
                th:classappend="${(isOpening or isMonthly ? 'summary-row ' : '') + (isCumulative ? 'cumulative-summary ' : '') + row.partName()}">
                
                <td th:text="${row.displayId()}">ID</td>
                <td th:text="${row.dateStr()}">Date</td>
                <td th:text="${row.comment()}">Comment</td>
                
                <td class="text-right amount" th:text="${row.total() != null and row.total().cents != 0 ? row.total().format(#locale) : ''}">Total</td>
                
                <td class="text-right amount" th:text="${row.amount(T(de.nihas101.midas.bookings.entity.BookingType).WITHDRAWAL).cents != 0 ? row.amount(T(de.nihas101.midas.bookings.entity.BookingType).WITHDRAWAL).format(#locale) : ''}">Withdrawal</td>
                <td class="text-right amount" th:text="${row.amount(T(de.nihas101.midas.bookings.entity.BookingType).TAX_PREVIOUS_YEAR).cents != 0 ? row.amount(T(de.nihas101.midas.bookings.entity.BookingType).TAX_PREVIOUS_YEAR).format(#locale) : ''}">Tax Prev</td>
                <td class="text-right amount" th:text="${row.amount(T(de.nihas101.midas.bookings.entity.BookingType).TAX_CREDIT).cents != 0 ? row.amount(T(de.nihas101.midas.bookings.entity.BookingType).TAX_CREDIT).format(#locale) : ''}">Tax Credit</td>
                <td class="text-right amount" th:text="${row.amount(T(de.nihas101.midas.bookings.entity.BookingType).INTEREST).cents != 0 ? row.amount(T(de.nihas101.midas.bookings.entity.BookingType).INTEREST).format(#locale) : ''}">Interest</td>
                <td class="text-right amount" th:text="${row.amount(T(de.nihas101.midas.bookings.entity.BookingType).COMPENSATION).cents != 0 ? row.amount(T(de.nihas101.midas.bookings.entity.BookingType).COMPENSATION).format(#locale) : ''}">Comp</td>
                
                <td class="text-right amount" th:text="${row.balance() != null and row.balance().cents != 0 ? row.balance().format(#locale) : ''}">Balance</td>
            </tr>
        </tbody>
    </table>
</div>
