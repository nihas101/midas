<div th:fragment="content">
    <h1 th:text="#{export.view.account-statements}">Kontoauszug</h1>
    
    <div class="header-info">
        <p><strong>Gesellschafter:</strong> <span th:text="${data.shareholderName}">Name</span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th th:each="header : ${data.headers}" th:text="${header}">Header</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data.rows}" 
                th:classappend="${row instanceof T(de.nihas101.midas.accountstatement.row.ClosingAccountStatementRow)} ? 'summary-row' : ''">
                
                <td th:text="${row.displayId() != null ? row.displayId() : ''}">ID</td>
                <td th:text="${row.dateStr()}">Date</td>
                <td th:text="${row.label()}">Type</td>
                
                <td class="text-right amount" th:text="${row.debit() != null and row.debit().cents != 0 ? row.debit().format(#locale) : ''}">Debit</td>
                <td class="text-right amount" th:text="${row.credit() != null and row.credit().cents != 0 ? row.credit().format(#locale) : ''}">Credit</td>
                <td class="text-right amount" th:text="${row.balance() != null ? row.balance().format(#locale) : ''}">Balance</td>
            </tr>
        </tbody>
    </table>
</div>
